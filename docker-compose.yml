services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nasiha
      POSTGRES_PASSWORD: nasiha
      POSTGRES_DB: nasiha
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nasiha"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://nasiha:nasiha@postgres:5432/nasiha?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:

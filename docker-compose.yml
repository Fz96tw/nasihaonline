services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nasiha
      POSTGRES_PASSWORD: nasiha
      POSTGRES_DB: nasiha
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nasiha"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nasiha
      MINIO_ROOT_PASSWORD: nasiha123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.10
    environment:
      MEILI_MASTER_KEY: nasiha-dev-master-key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3010:3000"
    environment:
      DATABASE_URL: postgresql://nasiha:nasiha@postgres:5432/nasiha?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_WEBHOOK_SIGNING_SECRET: ${CLERK_WEBHOOK_SIGNING_SECRET}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /accept-invite
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
      NEXT_PUBLIC_CLERK_AFTER_SIGN_OUT_URL: /sign-in
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3010}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-NASIHA <no-reply@mail.nasihaforyou.org>}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: nasiha
      MINIO_SECRET_KEY: nasiha123
      MINIO_BUCKET_AVATARS: avatars
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SIGNING_SECRET: ${STRIPE_WEBHOOK_SIGNING_SECRET}
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: nasiha-dev-master-key
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  worker:
    build:
      context: ./web
      dockerfile: Dockerfile
    command: ["sh", "-c", "npx prisma generate && npm run worker"]
    environment:
      DATABASE_URL: postgresql://nasiha:nasiha@postgres:5432/nasiha?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: nasiha-dev-master-key
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  meilisearch_data:
